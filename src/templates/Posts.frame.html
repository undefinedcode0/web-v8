<PostLayout title="anagnorisis - ${title}">
  <a href="/writing.html" class="back-link">&larr; back to blog</a>
  <header>
    <h2><span style="user-select: none; color: var(--text-muted)">//</span> ${title}</h2>
    <div style="user-select: none" class="meta">
      <span>written on ${date},</span>
      <span>by ${author}.</span>
      <span>updated on ${updDate}.</span>
    </div>
  </header>

  <hr class="divider" />

  <article>${--content}</article>

  <hr class="divider" />
</PostLayout>
